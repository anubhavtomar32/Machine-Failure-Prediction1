<!DOCTYPE html>
<html>
<head>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">

<h1>⚙️ Machine Health Monitor</h1>

<form action="/predict" method="post">

<input name="Temperature" placeholder="Temperature (°C)" required>
<input name="Vibration" placeholder="Vibration (mm/s)" required>
<input name="Pressure" placeholder="Pressure (bar)" required>
<input name="Runtime" placeholder="Runtime (hrs)" required>
<input name="Humidity" placeholder="Humidity (%)" required>

<button type="submit">Predict</button>

</form>

<a href="/analytics" class="btn">📊 Analytics</a>
<a href="/logout" class="btn">Logout</a>

</div>

</body>
</html>
