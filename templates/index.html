<!DOCTYPE html>
<html>
<head>
    <title>Machine Failure Prediction</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="container">
    <h1>⚙️ Machine Health Monitor</h1>

    <form id="form" action="/predict" method="post">
        <input type="number" name="Temperature" placeholder="🌡 Temperature" required>
        <input type="number" name="Vibration" placeholder="📳 Vibration" required>
        <input type="number" name="Pressure" placeholder="⚡ Pressure" required>
        <input type="number" name="Runtime" placeholder="⏱ Runtime" required>
        <input type="number" name="Humidity" placeholder="💧 Humidity" required>

        <button type="submit">Predict Status</button>
    </form>

    <div id="loader" class="hidden">Analyzing Machine...</div>
</div>

<script>
document.getElementById("form").addEventListener("submit", function() {
    document.getElementById("loader").classList.remove("hidden");
});
</script>

</body>
</html>
